<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INFINITY KIT&#9889; - Daily Life Tools</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <meta name="theme-color" content="#667eea">
    <link rel="apple-touch-icon" href="icon-192.png">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <h1 class="title">&#9889; INFINITY KIT &#9889;</h1>
        <p class="subtitle">Your Daily Life Toolkit</p>
        <button class="settings-btn" id="settingsBtn" onclick="openSettings()" aria-label="Settings" title="Settings">&#9881;&#65039;</button>
    </header>

    <!-- Search Bar -->
    <div class="search-container">
        <input 
            type="text" 
            id="searchBar" 
            class="search-bar" 
            placeholder="Search tools..."
        >
        <!-- Search Results Dropdown -->
        <div class="search-results" id="searchResults" style="display: none;">
            <div id="recentSearches" class="recent-searches-section"></div>
            <div id="searchResultsList" class="search-results-list"></div>
            <div id="noResults" class="no-results" style="display: none;">No results found</div>
        </div>
    </div>

    <!-- Back Button (Hidden by default) -->
    <div class="back-button-container" id="backButtonContainer" style="display: none;">
        <button class="back-button" id="backButton">&larr; Back to Folders</button>
        <h2 id="currentFolderTitle" class="current-folder-title"></h2>
    </div>

    <!-- Folders Grid -->
    <div class="tools-container">
        <div class="folders-grid" id="foldersGrid">
            <!-- Folder cards will be generated by JavaScript -->
        </div>
        
        <!-- Tools Grid (Hidden until folder is clicked) -->
        <div class="tools-grid" id="toolsGrid" style="display: none;">
            <!-- Tool squares will be generated by JavaScript -->
        </div>
    </div>

    <!-- Modal for Tool Content -->
    <div id="toolModal" class="modal">
        <div class="modal-content">
            <button class="close-btn" id="closeBtn">&times;</button>
            <h2 id="toolTitle"></h2>
            <div id="toolContent"></div>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast" class="toast"></div>

    <!-- Settings Modal -->
    <div id="settingsModal" class="settings-modal">
        <div class="settings-panel">
            <div class="settings-header">
                <h2>&#9881;&#65039; Settings </h2>
                <button class="settings-close" onclick="closeSettings()">&#10005;</button>
            </div>
            
            <div class="settings-content">
                <!-- Theme Settings -->
                <div class="settings-section">
                    <h3>&#127767; Theme</h3>
                    <div class="settings-option">
                        <label>
                            <input type="radio" name="theme" value="light" onchange="setTheme('light')"> &#9728;&#65039; Light Mode
                        </label>
                        <label>
                            <input type="radio" name="theme" value="dark" onchange="setTheme('dark')"> &#127769; Dark Mode
                        </label>
                    </div>
                </div>

                <!-- Font Size Control -->
                <div class="settings-section">
                    <h3>&#128292; Font Size</h3>
                    <div class="settings-option">
                        <label>
                            <input type="radio" name="fontSize" value="small" onchange="setFontSize('small')"> Small
                        </label>
                        <label>
                            <input type="radio" name="fontSize" value="medium" onchange="setFontSize('medium')"> Medium
                        </label>
                        <label>
                            <input type="radio" name="fontSize" value="large" onchange="setFontSize('large')"> Large
                        </label>
                    </div>
                </div>

                <!-- UI Preferences -->
                <div class="settings-section">
                    <h3>&#127912; UI Preferences</h3>
                    <div class="settings-option">
                        <label>Card Size:</label>
                        <div style="margin: 8px 0;">
                            <label>
                                <input type="radio" name="cardSize" value="compact" onchange="setCardSize('compact')"> Compact
                            </label>
                            <label>
                                <input type="radio" name="cardSize" value="normal" onchange="setCardSize('normal')"> Normal
                            </label>
                        </div>
                    </div>
                    <div class="settings-option">
                        <label>
                            <input type="checkbox" id="animToggle" onchange="toggleAnimations()"> Enable Animations
                        </label>
                    </div>
                </div>

                <!-- App Install -->
                <div class="settings-section">
                    <h3>&#128241; App</h3>
                    <div class="settings-option">
                        <button id="installAppBtn" type="button" class="install-app-btn">&#128242; Install App</button>
                        <p class="install-app-hint">Install Infinity Kit for faster access and offline support.</p>
                    </div>
                </div>

                <!-- Favorites Management -->
                <div class="settings-section">
                    <h3>Favorite Folders</h3>
                    <div id="favoritesList" style="margin: 10px 0; padding: 10px; background: #f5f7fa; border-radius: 6px; min-height: 30px; max-height: 150px; overflow-y: auto;">
                        <p style="color: #999; font-size: 0.9rem;">Long-press a folder card to favorite it</p>
                    </div>
                    <button onclick="clearAllFavorites()" style="width: 100%; padding: 8px; background: #dc3545; color: white; border: none; border-radius: 4px; cursor: pointer; margin-top: 8px;">Remove All Favorite Folders</button>
                </div>
            </div>
        </div>
    </div>

    <!-- PDF Libraries -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <script src="script.js"></script>
    <script src="expense-tracker.js"></script>
</body>
</html>
