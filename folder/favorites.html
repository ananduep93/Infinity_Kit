<body>
    <nav class="navbar"><div class="nav-logo" onclick="location.href='../index.html'">⚡INFINITY KIT</div></nav>
    <div class="breadcrumb"><a href="../index.html">Home</a><span class="separator">&rsaquo;</span><span class="current">Favorites</span></div>
    <main class="tool-page-container category-layout">
        <div class="tool-header"><h1 class="tool-title">⭐ Favorites</h1></div>
        <div class="tools-grid" id="toolsGrid"></div>
    </main>
    <script src="../main.js?v=16.7.20260426.1251"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const folderId = 'favorites';
            
            // Poll for settings and main.js initialization
            const pollInterval = setInterval(() => {
                if (typeof folders !== 'undefined' && typeof updateFolders === 'function') {
                    // Check if favorites have been loaded into appSettings
                    if (appSettings && Array.isArray(appSettings.favorites)) {
                        clearInterval(pollInterval);
                        updateFolders(); // Re-build virtual folders with favorite tools
                        const folder = folders.find(f => f.id === folderId);
                        if (folder) {
                            renderToolsInFolder(folder);
                        }
                    }
                }
            }, 50);

            // Safety timeout
            setTimeout(() => clearInterval(pollInterval), 5000);
        });
    </script>
</body>
