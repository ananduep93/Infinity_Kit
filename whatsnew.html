<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>What's New - INFINITY KIT</title>
    <link rel="canonical" href="https://infinitykit.online/whatsnew">
    <link rel="stylesheet" href="app.css">
    <style>
        .updates-container {
            max-width: 800px;
            margin: 100px auto 50px;
            padding: 0 20px;
        }

        .updates-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .updates-header h1 {
            font-size: 2.5rem;
            margin-bottom: 10px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .update-list {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        .update-card {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
            padding: 25px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
            transition: transform 0.3s ease;
        }

        [data-theme="light"] .update-card {
            background: white;
            border-color: #eee;
        }

        .update-card:hover {
            transform: translateY(-5px);
        }

        .update-date {
            font-size: 0.85rem;
            color: #667eea;
            font-weight: 600;
            margin-bottom: 10px;
            display: block;
        }

        .update-message {
            font-size: 1.1rem;
            line-height: 1.6;
            white-space: pre-wrap;
        }

        .loading-updates {
            text-align: center;
            padding: 50px;
            font-size: 1.2rem;
            opacity: 0.7;
        }

        @media (max-width: 600px) {
            .updates-header h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="nav-logo" onclick="location.href='/'">&#9889;INFINITY KIT</div>
        <div class="nav-right">
            <a href="/" style="color: white; text-decoration: none; font-weight: 500;">&larr; Back to Home</a>
        </div>
    </nav>

    <div class="updates-container">
        <div class="updates-header">
            <h1>What's New? 🚀</h1>
            <p>Stay updated with the latest features and tools in Infinity Kit.</p>
        </div>

        <div id="updatesList" class="update-list">
            <div class="loading-updates">Fetching latest updates...</div>
        </div>
    </div>

    <script type="module">
        import { db, collection, query, orderBy, getDocs } from './firebase-config.js';

        async function fetchUpdates() {
            const updatesList = document.getElementById('updatesList');
            try {
                const q = query(collection(db, 'updates'), orderBy('timestamp', 'desc'));
                const querySnapshot = await getDocs(q);
                
                if (querySnapshot.empty) {
                    updatesList.innerHTML = '<div class="loading-updates">No updates yet. Check back later!</div>';
                    return;
                }

                updatesList.innerHTML = '';
                querySnapshot.forEach((doc) => {
                    const data = doc.data();
                    const date = data.timestamp ? data.timestamp.toDate() : new Date();
                    const formattedDate = date.toLocaleDateString('en-US', {
                        year: 'numeric',
                        month: 'long',
                        day: 'numeric',
                        hour: '2-digit',
                        minute: '2-digit'
                    });

                    const card = document.createElement('div');
                    card.className = 'update-card';
                    card.innerHTML = `
                        <span class="update-date">${formattedDate}</span>
                        <div class="update-message">${data.message}</div>
                    `;
                    updatesList.appendChild(card);
                });
            } catch (error) {
                console.error("Error fetching updates: ", error);
                updatesList.innerHTML = '<div class="loading-updates">Error loading updates. Please try again.</div>';
            }
        }

        fetchUpdates();

        // Anti-flicker Theme Script
        (function() {
            try {
                const saved = localStorage.getItem('infinityKitSettings');
                if (saved) {
                    const settings = JSON.parse(saved);
                    if (settings.theme) {
                        document.documentElement.setAttribute('data-theme', settings.theme);
                    }
                }
            } catch (e) {}
        })();
    </script>
</body>
</html>
