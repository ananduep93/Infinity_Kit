<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Panel - INFINITY KIT</title>
    <link rel="canonical" href="https://infinitykit.online/admin">
    <link rel="stylesheet" href="app.css">
    <style>
        :root {
            --admin-primary: #667eea;
            --admin-secondary: #764ba2;
            --admin-bg: #f8f9fa;
            --admin-card-bg: #ffffff;
            --admin-text: #2d3436;
        }

        [data-theme="dark"] {
            --admin-bg: #1a1a2e;
            --admin-card-bg: #16213e;
            --admin-text: #e1e1e1;
        }

        body.admin-body {
            background: var(--admin-bg);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            font-family: 'Inter', -apple-system, sans-serif;
            color: var(--admin-text);
        }

        .admin-card {
            background: var(--admin-card-bg);
            padding: 2.5rem;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
            width: 100%;
            max-width: 400px;
            text-align: center;
            transition: transform 0.3s ease;
        }

        .admin-card h2 {
            margin-bottom: 1.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--admin-primary), var(--admin-secondary));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }

        .form-group label {
            display: block;
            margin-bottom: 0.5rem;
            font-size: 0.9rem;
            font-weight: 600;
        }

        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #eee;
            border-radius: 10px;
            font-size: 1rem;
            transition: border-color 0.3s;
            background: transparent;
            color: inherit;
            box-sizing: border-box;
        }

        [data-theme="dark"] .form-group input, 
        [data-theme="dark"] .form-group textarea {
            border-color: #2c3e50;
        }

        .form-group input:focus, .form-group textarea:focus {
            outline: none;
            border-color: var(--admin-primary);
        }

        .admin-btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            background: linear-gradient(135deg, var(--admin-primary), var(--admin-secondary));
            color: white;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.3s, transform 0.2s;
            margin-top: 1rem;
        }

        .admin-btn:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        .admin-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        #loginError {
            color: #ff4757;
            font-size: 0.85rem;
            margin-top: 1rem;
            display: none;
        }

        #adminPanel {
            display: none;
        }

        .success-msg {
            color: #2ecc71;
            font-size: 0.9rem;
            margin-top: 1rem;
            display: none;
        }

        textarea {
            resize: vertical;
            min-height: 100px;
        }
    </style>
</head>
<body class="admin-body">

    <!-- Login Form Section -->
    <div id="loginSection" class="admin-card">
        <h2>Admin Login</h2>
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" placeholder="Enter username">
        </div>
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" placeholder="Enter password">
        </div>
        <button id="loginBtn" class="admin-btn">Login</button>
        <p id="loginError">Invalid credentials</p>
    </div>

    <!-- Admin Panel Section -->
    <div id="adminPanel" style="display: none;">
        <!-- Post Update Card -->
        <div class="admin-card" style="margin-bottom: 2rem;">
            <h2>Post Update</h2>
            <p style="margin-bottom: 20px; opacity: 0.8;">Post a new update to the website</p>
            <div class="form-group">
                <label for="updateMessage">Update Message</label>
                <textarea id="updateMessage" placeholder="What's new?"></textarea>
            </div>
            <button id="submitUpdate" class="admin-btn">Post Update ✨</button>
            <p id="successMsg" class="success-msg">Update posted successfully!</p>
        </div>

        <!-- Affiliate Ad Card -->
        <div class="admin-card">
            <h2>Affiliate Ad</h2>
            <p style="margin-bottom: 20px; opacity: 0.8;">Add a new affiliate product</p>
            <div class="form-group">
                <label for="productTitle">Product Title</label>
                <input type="text" id="productTitle" placeholder="Enter product name">
            </div>
            <div class="form-group">
                <label for="affiliateLink">Affiliate Link</label>
                <input type="url" id="affiliateLink" placeholder="https://...">
            </div>
            <div class="form-group">
                <label for="mediaLink">Media (Image) Link</label>
                <input type="url" id="mediaLink" placeholder="Image URL">
            </div>
            <button id="submitAffiliate" class="admin-btn">Add Product 🎁</button>
            <p id="affiliateSuccessMsg" class="success-msg">Product added successfully!</p>
        </div>
    </div>

    <script type="module">
        import { db, collection, addDoc, serverTimestamp } from './firebase-config.js';

        const loginSection = document.getElementById('loginSection');
        const adminPanel = document.getElementById('adminPanel');
        const loginBtn = document.getElementById('loginBtn');
        const usernameInput = document.getElementById('username');
        const passwordInput = document.getElementById('password');
        const loginError = document.getElementById('loginError');

        const submitUpdateBtn = document.getElementById('submitUpdate');
        const updateMessage = document.getElementById('updateMessage');
        const successMsg = document.getElementById('successMsg');

        const submitAffiliateBtn = document.getElementById('submitAffiliate');
        const productTitle = document.getElementById('productTitle');
        const affiliateLink = document.getElementById('affiliateLink');
        const mediaLink = document.getElementById('mediaLink');
        const affiliateSuccessMsg = document.getElementById('affiliateSuccessMsg');

        // Login Logic
        loginBtn.addEventListener('click', () => {
            const user = usernameInput.value;
            const pass = passwordInput.value;

            if (user === 'infinitykit' && pass === 'infinity27') {
                loginSection.style.display = 'none';
                adminPanel.style.display = 'block';
                document.body.style.alignItems = 'flex-start';
                document.body.style.padding = '2rem 0';
            } else {
                loginError.style.display = 'block';
                setTimeout(() => {
                    loginError.style.display = 'none';
                }, 3000);
            }
        });

        // Submit Update Logic
        submitUpdateBtn.addEventListener('click', async () => {
            const message = updateMessage.value.trim();
            if (!message) return;

            submitUpdateBtn.disabled = true;
            submitUpdateBtn.textContent = 'Uploading...';
            successMsg.style.display = 'none';

            try {
                await addDoc(collection(db, 'updates'), {
                    message: message,
                    timestamp: serverTimestamp()
                });

                successMsg.style.display = 'block';
                updateMessage.value = '';
                
                setTimeout(() => {
                    successMsg.style.display = 'none';
                }, 4000);
            } catch (error) {
                console.error("Error adding document: ", error);
                alert("Failed to post update. Check console.");
            } finally {
                submitUpdateBtn.disabled = false;
                submitUpdateBtn.textContent = 'Post Update ✨';
            }
        });

        // Submit Affiliate Logic
        submitAffiliateBtn.addEventListener('click', async () => {
            const title = productTitle.value.trim();
            const aLink = affiliateLink.value.trim();
            const mLink = mediaLink.value.trim();

            if (!title || !aLink || !mLink) {
                alert("Please fill all fields");
                return;
            }

            submitAffiliateBtn.disabled = true;
            submitAffiliateBtn.textContent = 'Saving...';
            affiliateSuccessMsg.style.display = 'none';

            try {
                await addDoc(collection(db, 'affiliateAds'), {
                    title: title,
                    affiliateLink: aLink,
                    mediaLink: mLink,
                    timestamp: serverTimestamp()
                });

                affiliateSuccessMsg.style.display = 'block';
                productTitle.value = '';
                affiliateLink.value = '';
                mediaLink.value = '';
                
                setTimeout(() => {
                    affiliateSuccessMsg.style.display = 'none';
                }, 4000);
            } catch (error) {
                console.error("Error adding affiliate: ", error);
                alert("Failed to add product. Check console.");
            } finally {
                submitAffiliateBtn.disabled = false;
                submitAffiliateBtn.textContent = 'Add Product 🎁';
            }
        });

        // Anti-flicker Theme Script integration
        (function() {
            try {
                const saved = localStorage.getItem('infinityKitSettings');
                if (saved) {
                    const settings = JSON.parse(saved);
                    if (settings.theme) {
                        document.documentElement.setAttribute('data-theme', settings.theme);
                    }
                }
            } catch (e) {}
        })();
    </script>
</body>
</html>
