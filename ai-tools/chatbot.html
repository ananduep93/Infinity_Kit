<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Chatbot | Infinity Kit ⚡</title>
    <link rel="canonical" href="https://infinitykit.online/ai-tools/chatbot">
    <link rel="stylesheet" href="../app.css">
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script>
        document.documentElement.setAttribute('data-theme', 'light');
    </script>
    <style>
        body { background-color: #f0f2f5; }
        .tool-container {
            max-width: 800px;
            margin: 40px auto;
            padding: 0 20px;
        }
        .breadcrumb { font-size: 0.9rem; color: #666; margin-bottom: 20px; }
        .breadcrumb a { color: #4a6cf7; text-decoration: none; }
        
        .glass-panel {
            background: white;
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            border: 1px solid rgba(0,0,0,0.05);
        }
        h2 { color: #333; margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        
        .chat-container {
            height: 450px;
            overflow-y: auto;
            padding: 20px;
            background: #f8f9fa;
            border-radius: 15px;
            margin-bottom: 20px;
            display: flex;
            flex-direction: column;
            gap: 15px;
            border: 1px solid #eee;
        }
        .chat-message {
            padding: 12px 16px;
            border-radius: 15px;
            max-width: 80%;
            font-size: 0.95rem;
            line-height: 1.5;
        }
        .user-message {
            align-self: flex-end;
            background: #4a6cf7;
            color: white;
            border-bottom-right-radius: 2px;
        }
        .ai-message {
            align-self: flex-start;
            background: white;
            color: #333;
            border: 1px solid #eee;
            border-bottom-left-radius: 2px;
        }
        .chat-input-area { display: flex; gap: 10px; }
        .chat-input-area input {
            flex: 1;
            padding: 12px 20px;
            border-radius: 50px;
            border: 1px solid #ddd;
            outline: none;
            font-size: 1rem;
        }
        .chat-input-area input:focus { border-color: #4a6cf7; }
        .send-btn {
            background: #4a6cf7;
            color: white;
            border: none;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-logo" onclick="window.location.href='/'">⚡ INFINITY KIT</div>
    </nav>

    <div class="tool-container">
        <div class="breadcrumb">
            <a href="/">Home</a> &nbsp;&rsaquo;&nbsp; <a href="/">AI Tools</a> &nbsp;&rsaquo;&nbsp; AI Chatbot
        </div>
        
        <div class="glass-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
                <h2 style="margin: 0;">🤖 AI Chatbot</h2>
                <button id="history-btn" class="send-btn" style="background: #edf2f7; color: #4a5568; font-size: 0.8rem; padding: 5px 15px;">📜 History</button>
            </div>
            <p style="color: #666; margin-bottom: 25px;">Chat with our intelligent assistant for help with anything.</p>
            
            <div class="chat-container" id="chat-history">
                <div class="chat-message ai-message">Hello! How can I help you today?</div>
            </div>

            <form class="chat-input-area" id="chat-form">
                <input type="text" id="chat-input" placeholder="Type your message..." autocomplete="off">
                <button type="submit" class="send-btn">Send</button>
            </form>
        </div>
    </div>

    <script type="module">
        import { authService } from '../auth.js';
        authService.onAuthChange((user) => { if (!user) window.location.href = '../signin.html'; });
    </script>
    <script src="script.js"></script>
</body>
</html>
