<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Survey - Infinity Kit⚡</title>
    <meta name="description" content="Take part in this survey on Infinity Kit.">
    <link rel="stylesheet" href="../app.css?v=16.7.20260426.1318">
    <link rel="shortcut icon" href="../icon-192.png?v=16.7.20260426.1318" type="image/png">
    <style>
        .tool-page-container { max-width: 700px; margin: 40px auto; padding: 20px; }
        .public-survey-container { padding: 40px; border-radius: 20px; }
        h1 { margin-bottom: 10px; color: var(--primary-color, #667eea); }
        .survey-description { margin-bottom: 30px; line-height: 1.6; color: #666; }
        [data-theme="dark"] .survey-description { color: #aaa; }
        .form-question { margin-bottom: 25px; display: flex; flex-direction: column; gap: 12px; }
        .form-question label { font-weight: bold; font-size: 1.1rem; }
        .required { color: #ff4d4d; }
        input[type="text"], textarea, select { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #ddd; background: rgba(255,255,255,0.8); }
        [data-theme="dark"] input[type="text"], [data-theme="dark"] textarea, [data-theme="dark"] select { background: rgba(255,255,255,0.05); color: white; border-color: #444; }
        .btn-submit { width: 100%; padding: 15px; border-radius: 10px; border: none; background: var(--primary-color, #667eea); color: white; font-size: 1.1rem; font-weight: bold; cursor: pointer; margin-top: 20px; transition: opacity 0.2s; }
        .btn-submit:hover { opacity: 0.9; }
        .image-options-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .image-option { position: relative; cursor: pointer; border-radius: 10px; overflow: hidden; border: 2px solid transparent; transition: all 0.2s; background: rgba(0,0,0,0.05); }
        .image-option input { position: absolute; opacity: 0; }
        .image-option img { width: 100%; height: 140px; object-fit: cover; display: block; }
        .image-option:hover { border-color: #ddd; }
        .image-option:has(input:checked) { border-color: var(--primary-color, #667eea); box-shadow: 0 0 10px rgba(102, 126, 234, 0.3); }
        
        .radio-indicator { position: absolute; top: 10px; right: 10px; width: 20px; height: 20px; border-radius: 50%; border: 2px solid #fff; background: rgba(0,0,0,0.2); z-index: 1; }
        .image-option:has(input:checked) .radio-indicator { background: var(--primary-color, #667eea); border-color: #fff; }
        .image-option:has(input:checked) .radio-indicator::after { content: '✓'; color: white; font-size: 12px; display: flex; justify-content: center; align-items: center; height: 100%; }
        
        .success-message { text-align: center; padding: 40px; }
        .success-message h2 { color: #4caf50; margin-bottom: 15px; }
    </style>
</head>
<body>
    <nav class="navbar"><div class="nav-logo" onclick="location.href='/'">⚡INFINITY KIT</div></nav>
    <main class="tool-page-container">
        <div id="toolContent">
            <div class="loading-placeholder">Loading survey...</div>
        </div>
    </main>
    <footer class="footer"><div class="footer-links"><a href="/">Home</a></div></footer>

    <script src="../notifications.js?v=16.7.20260426.1318"></script>
    <script src="../main.js?v=16.7.20260426.1318"></script>
    <script type="module" src="../survey-hub.js?v=16.7.20260426.1318"></script>
    <script>
        window.toolContent = document.getElementById('toolContent');
        document.addEventListener('DOMContentLoaded', () => {
            const pollSync = setInterval(() => {
                if (typeof loadPublicSurvey === 'function') {
                    clearInterval(pollSync);
                    loadPublicSurvey();
                }
            }, 100);
        });
    </script>
</body>
</html>
