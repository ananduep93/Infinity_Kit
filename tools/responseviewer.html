<!DOCTYPE html>
<html lang="en">
<head>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Response Viewer - Infinity Kit⚡</title>
    <link rel="canonical" href="https://infinitykit.online/tools/responseviewer">
    <!-- Google AdSense -->
    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-8795968572402515"
     crossorigin="anonymous"></script>

    <meta name="description" content="Analyze and view survey responses. Download responses as PDF. Free online tool from Infinity Kit.">
    <link rel="stylesheet" href="../app.css?v=16.7.20260426.1318">
    <link rel="shortcut icon" href="../icon-192.png?v=16.7.20260426.1318" type="image/png">
    <style>
        .tool-page-container { max-width: 1000px; margin: 20px auto; padding: 20px; }
        .viewer-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 25px; flex-wrap: wrap; gap: 15px; }
        .viewer-actions { display: flex; gap: 10px; }
        .viewer-actions button { padding: 10px 20px; border-radius: 8px; border: none; cursor: pointer; background: #eee; }
        .viewer-actions button:first-child { background: var(--primary-color, #667eea); color: white; }
        .tabs { display: flex; border-bottom: 2px solid #eee; margin-bottom: 20px; gap: 20px; }
        .tab-btn { padding: 10px 20px; border: none; background: none; cursor: pointer; font-weight: bold; color: #666; }
        .tab-btn.active { color: var(--primary-color, #667eea); border-bottom: 2px solid var(--primary-color, #667eea); margin-bottom: -2px; }
        .summary-card { margin-bottom: 20px; padding: 20px; border-radius: 12px; }
        .chart-row { display: flex; align-items: center; gap: 10px; margin-top: 10px; }
        .label { width: 120px; font-size: 0.9rem; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .bar-cont { flex: 1; height: 12px; background: #eee; border-radius: 6px; overflow: hidden; }
        .bar { height: 100%; background: var(--primary-color, #667eea); border-radius: 6px; }
        .count { width: 30px; font-size: 0.85rem; font-weight: bold; }
        .individual-response { margin-bottom: 20px; padding: 20px; border-radius: 12px; border-left: 5px solid var(--primary-color, #667eea); }
        .ans-row { margin-top: 10px; display: flex; flex-direction: column; gap: 4px; }
        .ans-row strong { color: var(--primary-color, #667eea); font-size: 0.9rem; }
        .ans-value { font-size: 1rem; color: var(--text-color); }
        .submitted-at { font-size: 0.8rem; color: #888; margin-bottom: 12px; display: block; }
        .preview-img { height: 120px; width: auto; max-width: 200px; object-fit: cover; border-radius: 8px; border: 1px solid rgba(0,0,0,0.1); margin-top: 5px; display: block; cursor: pointer; transition: transform 0.2s; }
        .preview-img:hover { transform: scale(1.05); }
    </style>
</head>
<body>
    <nav class="navbar"><div class="nav-logo" onclick="location.href='/'">⚡INFINITY KIT</div></nav>
    <div class="breadcrumb">
        <a href="/">Home</a><span class="separator">&rsaquo;</span>
        <a href="../folder/survey-hub.html">Survey Hub</a><span class="separator">&rsaquo;</span>
        <span class="current">Response Viewer</span>
    </div>
    <main class="tool-page-container">
        <a href='../tools/mysurveys.html' class='back-link'><span>&larr;</span> Back to Dashboard</a>
        <div id="toolContent">
            <div class="loading-placeholder">Loading responses...</div>
        </div>
    </main>
    <footer class="footer"><div class="footer-links"><a href="/">Home</a></div></footer>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <script src="../notifications.js?v=16.7.20260426.1318"></script>
    <script src="../main.js?v=16.7.20260426.1318"></script>
    <script type="module" src="../survey-hub.js?v=16.7.20260426.1318"></script>
    <script>
        window.toolContent = document.getElementById('toolContent');
        document.addEventListener('DOMContentLoaded', () => {
            const surveyId = new URLSearchParams(window.location.search).get('id');
            const pollSync = setInterval(() => {
                if (typeof loadResponseViewer === 'function') {
                    clearInterval(pollSync);
                    loadResponseViewer(surveyId);
                }
            }, 100);
        });
    </script>
</body>
</html>
