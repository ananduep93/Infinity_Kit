    <script src="../expense-tracker.js"></script>
    
    <script>
        // Mock the modal content target for main.js
        window.toolContent = document.getElementById('toolContent');
        window.toolTitle = { textContent: '' }; // Dummy to prevent errors
        
        document.addEventListener('DOMContentLoaded', () => {
            if (typeof loadWordCounter === 'function') {
                loadWordCounter();
                trackToolUsage('wordcounter');
                addRecentTool('wordcounter', 'Word Counter');
            } else {
                window.toolContent.innerHTML = '<div class="error">Tool logic failed to load. Please refresh the page.</div>';
            }
        });
    </script>
